name: scout_sdk
description: Flutter wrapper for Scout — an iOS analytics framework providing logging, metrics, crash reporting, and session tracking backed by Apple's CloudKit.
version: 0.1.0
repository: https://github.com/kasianov-mikhail/scout_sdk
topics:
  - analytics
  - cloudkit
  - ios

environment:
  sdk: ^3.11.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  swift_log_bridge: ^0.1.0
  swift_metrics_bridge: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.kasianov.scout_sdk
        pluginClass: ScoutSdkPlugin
      ios:
        pluginClass: ScoutSdkPlugin
